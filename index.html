<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 출석 관리 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 중요: 본인의 Firebase 프로젝트 설정으로 교체하세요!
        const firebaseConfig = {
            apiKey: "AIzaSyByptsZpg8QJQ0hFCGWLuEPF1EHyEnXar8",
  apiKey: "AIzaSyCH-4C3eBfcy72uL8hSKWPetKN1wpFtDPQ",
  authDomain: "test-2026-5973d.firebaseapp.com",
  projectId: "test-2026-5973d",
  storageBucket: "test-2026-5973d.firebasestorage.app",
  messagingSenderId: "738921589536",
  appId: "1:738921589536:web:cc9431bb297367030f4545"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const attendanceCol = collection(db, "attendance");

        // UI 요소 참조
        const nameInput = document.getElementById('studentName');
        const recordList = document.getElementById('recordList');

        // 출석 데이터 저장 함수
        window.markAttendance = async (status) => {
            const name = nameInput.value.trim();
            if (!name) {
                alert("학생 이름을 입력해주세요.");
                return;
            }

            try {
                await addDoc(attendanceCol, {
                    name: name,
                    status: status,
                    timestamp: serverTimestamp()
                });
                nameInput.value = ""; // 입력창 초기화
                console.log("저장 완료!");
            } catch (e) {
                console.error("에러 발생: ", e);
                alert("데이터 저장 중 오류가 발생했습니다.");
            }
        };

        // 실시간 데이터 수신 및 화면 표시
        const q = query(attendanceCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            recordList.innerHTML = ""; // 기존 목록 비우기
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.timestamp ? data.timestamp.toDate().toLocaleString() : "처리 중...";
                
                // 상태별 스타일 지정
                let statusColor = "";
                let statusLabel = "";
                if (data.status === '출석') { statusColor = "bg-green-100 text-green-700"; statusLabel = "출석"; }
                else if (data.status === '결석') { statusColor = "bg-red-100 text-red-700"; statusLabel = "결석"; }
                else { statusColor = "bg-yellow-100 text-yellow-700"; statusLabel = "지각"; }

                const row = `
                    <div class="flex items-center justify-between p-4 mb-3 bg-white rounded-xl shadow-sm border border-gray-100 transition-all hover:shadow-md">
                        <div>
                            <span class="font-bold text-gray-800 text-lg">${data.name}</span>
                            <p class="text-xs text-gray-400 mt-1">${date}</p>
                        </div>
                        <span class="px-4 py-1.5 rounded-full text-sm font-semibold ${statusColor}">
                            ${statusLabel}
                        </span>
                    </div>
                `;
                recordList.innerHTML += row;
            });
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4">

    <div class="max-w-md mx-auto">
        <!-- 헤더 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">출석 체크 시스템</h1>
            <p class="text-slate-500 mt-2">학생의 출석 상태를 실시간으로 기록하세요</p>
        </header>

        <!-- 입력 섹션 -->
        <div class="glass-morphism rounded-2xl p-6 shadow-xl mb-8 border border-white">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">학생 이름</label>
                <input type="text" id="studentName" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" 
                    placeholder="이름을 입력하세요">
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <button onclick="markAttendance('출석')" 
                    class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-green-100">
                    출석
                </button>
                <button onclick="markAttendance('지각')" 
                    class="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-yellow-100">
                    지각
                </button>
                <button onclick="markAttendance('결석')" 
                    class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-lg shadow-red-100">
                    결석
                </button>
            </div>
        </div>

        <!-- 리스트 섹션 -->
        <div class="space-y-4">
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 class="text-xl font-bold text-gray-800">최근 기록</h2>
                <span class="text-sm text-blue-600 font-medium">실시간 동기화 중</span>
            </div>
            <div id="recordList">
                <!-- 데이터가 여기에 동적으로 추가됨 -->
                <div class="text-center py-10 text-gray-400">
                    기록을 불러오는 중이거나 데이터가 없습니다.
                </div>
            </div>
        </div>
    </div>

</body>
</html>
